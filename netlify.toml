# Netlify build & deploy config
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Redirect: tutte le rotte non-API servono index.html, così
# react-router-dom funziona anche se l'utente apre direttamente /task/abc
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers di default per tutto il sito
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Override per la rotta /embed: permette il caricamento in iframe
# da qualsiasi origine (necessario per l'embed nel backoffice Pienissimo PRO).
# IMPORTANTE: il valore "frame-ancestors *" della CSP sovrascrive
# l'X-Frame-Options DENY definito sopra.
[[headers]]
  for = "/embed"
  [headers.values]
    X-Frame-Options = "ALLOWALL"
    Content-Security-Policy = "frame-ancestors *"

[[headers]]
  for = "/embed/*"
  [headers.values]
    X-Frame-Options = "ALLOWALL"
    Content-Security-Policy = "frame-ancestors *"
